services:
  # Backend API Service
  - type: web
    name: intercity-taxi-backend
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: BOT_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: WEBHOOK_URL
        fromService:
          name: intercity-taxi-backend
          type: web
          property: url
      - key: WEB_APP_URL
        fromService:
          name: intercity-taxi-frontend
          type: static
          property: url
      - key: ADMIN_TELEGRAM_ID
        sync: false  # Set manually
      - key: DB_HOST
        sync: false  # Set manually after creating PostgreSQL
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        sync: false  # Set manually after creating PostgreSQL
      - key: DB_USER
        sync: false  # Set manually after creating PostgreSQL
      - key: DB_PASSWORD
        sync: false  # Set manually after creating PostgreSQL
      - key: REDIS_HOST
        sync: false  # Optional - set if using Redis
      - key: REDIS_PORT
        value: 6379
      - key: DRIVER_OFFLINE_TIMEOUT_HOURS
        value: 12
      - key: ORDER_ALERT_TIMEOUT_HOURS
        value: 2
      - key: MAX_BROADCAST_PER_SECOND
        value: 25
    healthCheckPath: /health

  # Frontend Static Site
  - type: static
    name: intercity-taxi-frontend
    plan: free
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    buildCommand: ""  # Build happens in Dockerfile
    staticPublishPath: /usr/share/nginx/html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: intercity-taxi-backend
          type: web
          property: url
